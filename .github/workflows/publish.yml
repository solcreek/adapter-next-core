name: Publish

on:
  push:
    tags:
      - 'v*'
  # Manual trigger from the Actions UI / `gh workflow run` — runs the
  # install/build/test pipeline only. The publish step is gated on
  # github.event_name == 'push' so manual runs never accidentally
  # release.
  workflow_dispatch:

permissions:
  id-token: write    # required for npm OIDC trusted publishing + provenance
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          # No cache: release builds must not reuse a stale dep tree.

      - run: pnpm install --frozen-lockfile

      - name: Verify package version matches tag
        if: github.event_name == 'push'
        run: |
          tag_version="${GITHUB_REF#refs/tags/v}"
          pkg_version=$(node -p "require('./package.json').version")
          if [[ "$tag_version" != "$pkg_version" ]]; then
            echo "::error::tag $GITHUB_REF declares version $tag_version but package.json says $pkg_version"
            exit 1
          fi
          echo "✓ package.json version $pkg_version matches tag"

      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test

      # npm CLI (not pnpm publish) handles the OIDC token exchange
      # and SLSA provenance attestation. Skipped on workflow_dispatch
      # so manual verifications never accidentally cut a release.
      - run: npm publish --provenance --access public
        if: github.event_name == 'push'
